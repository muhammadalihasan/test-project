name: Learning
on:
 workflow_dispatch:

jobs:
  producer:
    runs-on: ubuntu-24.04
    steps:
      - name: Echo job
        id: echo-job
        run: |
         echo "Hello there!"
         echo "This file was uploaded to artifacts">>file1.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: example-artifact
          path: file1.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: example-artifact

      - name: View artifact
        run: |
          cat file1.txt
 

